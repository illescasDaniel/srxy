name: CI

on:
  push:
    branches: [main, feature/tui]
  pull_request:
    branches: [main, feature/tui]

jobs:
  quality:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Create virtual environment
        run: python -m venv .venv

      - name: Install dependencies
        run: |
          .venv/bin/pip install --upgrade "pip>=26.1.2"
          .venv/bin/pip install -e ".[dev]"

      - name: Install shell linting tools
        run: |
          sudo apt-get install -y shellcheck shfmt

      - name: Quality gate
        env:
          CI: true
          GITHUB_ACTIONS: true
        run: ./scripts/quality/checks.sh

  test-macos:
    runs-on: macos-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Create virtual environment
        run: python -m venv .venv

      - name: Install dependencies
        run: |
          .venv/bin/pip install --upgrade "pip>=26.1.2"
          .venv/bin/pip install -e ".[dev]"

      - name: Unit tests
        env:
          CI: true
        run: .venv/bin/pytest tests -m "unit and not semantic and not transcribe"

  test-windows:
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Create virtual environment
        run: python -m venv .venv

      - name: Install dependencies
        run: |
          .venv\Scripts\pip install --upgrade "pip>=26.1.2"
          .venv\Scripts\pip install -e ".[dev,windows]"

      - name: Unit tests
        env:
          CI: true
        run: .venv\Scripts\pytest tests -m "unit and not semantic and not transcribe"
